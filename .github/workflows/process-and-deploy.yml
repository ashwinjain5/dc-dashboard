name: Process NDJSON & Deploy Dashboard
on:
  push:
    paths: ['snapshots/latest.ndjson']
  workflow_dispatch:

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Process NDJSON → JSON summaries
        run: node scripts/ndjson_to_summaries.cjs snapshots/latest.ndjson public/data
      - name: Encrypt data files
        run: node scripts/encrypt_data.cjs public/data
        env:
          DASHBOARD_EMAIL: ${{ secrets.DASHBOARD_EMAIL }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      - name: Install dependencies
        run: npm ci
      - name: Build dashboard
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
